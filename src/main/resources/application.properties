# ===================================================================
# 1. DATABASE CONNECTION SETTINGS
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/mystartersql?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# 2. HIBERNATE / JPA SETTINGS
# ===================================================================
spring.jpa.hibernate.ddl-auto=update

# Fixed standard property dialect for Hibernate core engines
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Console SQL Query Logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===================================================================
# 3. PERFORMANCE CONNECTION POOLING (HIKARI PC)
# ===================================================================
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ===================================================================
# 4. JWT SETTINGS
# ===================================================================
# Secret key used to sign/verify JWTs with HMAC-SHA. Pulled from the
# JWT_SECRET environment variable — never hardcoded here. No default
# value is given on purpose: if JWT_SECRET isn't set, the app will
# fail to start instead of silently running with a missing/weak key.
jwt.secret=${JWT_SECRET}

# Token expiration in milliseconds. 20 minutes = 20 * 60 * 1000.
# This is the SLIDING window: JwtAuthFilter re-issues a fresh token
# with this same expiration on every authenticated request, so a user
# stays logged in as long as they keep making requests within any
# 20-minute gap. If 20 minutes pass with zero requests, the token
# expires and they're logged out.
jwt.expiration=1200000