# ===================================================================
# 1. DATABASE CONNECTION SETTINGS
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/mystartersql?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Hanuman@7
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# 2. HIBERNATE / JPA SETTINGS
# ===================================================================
spring.jpa.hibernate.ddl-auto=update

# Fixed standard property dialect for Hibernate core engines
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Console SQL Query Logging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===================================================================
# 3. PERFORMANCE CONNECTION POOLING (HIKARI PC)
# ===================================================================
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000