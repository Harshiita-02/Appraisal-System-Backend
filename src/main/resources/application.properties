# ===================================================================
# 1. DATABASE CONNECTION SETTINGS
# ===================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/mystartersql?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# 2. HIBERNATE / JPA SETTINGS
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===================================================================
# 3. PERFORMANCE CONNECTION POOLING (HIKARI PC)
# ===================================================================
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ===================================================================
# 4. JWT SETTINGS
# ===================================================================
jwt.secret=${JWT_SECRET}
jwt.expiration=1200000

# ===================================================================
# 5. EMAIL SETTINGS (Gmail SMTP)
# ===================================================================
# Pull credentials from environment variables — never hardcode here.
# MAIL_USERNAME = your full Gmail address  e.g. yourname@gmail.com
# MAIL_PASSWORD = your Gmail App Password  (NOT your Gmail login password)
#
# How to get a Gmail App Password (takes 2 minutes):
#   1. Go to your Google Account → Security
#   2. Turn ON "2-Step Verification" if it's off
#   3. Search "App passwords" in Google Account search bar
#   4. Create one → choose "Mail" + "Windows Computer" → copy the 16-char password
#   5. Set that as your MAIL_PASSWORD environment variable
#
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=harshita2dec2004@gmail.com
spring.mail.password=rdjixuqyorvpxmbg
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.test-connection=false

# Set to false so a failed email never crashes or rolls back the
# main business transaction (the in-app notification still saves).